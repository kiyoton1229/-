<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>crazyゆうき BIRTHDAY</title>
<style>
body{
  margin:0;
  padding:0;
  overflow:hidden;
  font-family:sans-serif;
  text-align:center;
  color:white;
  background:black;
}

canvas#stars{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
  background: url('space_bg.jpg') no-repeat center center fixed;
  background-size: cover;
}

h1{
  margin-top:100px;
  font-size:2em;
  text-shadow:0 0 25px #00f;
}

p{
  font-size:1.2em;
  margin:20px;
}

button{
  padding:15px 30px;
  font-size:1.2em;
  border:none;
  border-radius:30px;
  background:#00c3ff;
  color:white;
  cursor:pointer;
  box-shadow:0 0 20px #00c3ff;
  margin:5px;
}

button:hover{
  background:#0099cc;
}

#rocket{
  position:fixed;
  bottom:-250px;
  left:50%;
  transform:translateX(-50%);
  width:150px;
  transition:3s ease-in-out;
  z-index:5;
}

.photo{
  width:250px;
  border-radius:20px;
  margin-top:20px;
  box-shadow:0 0 20px white;
}

#fullScreenBtn{
  position:fixed;
  bottom:15px;
  right:15px;
  padding:10px 15px;
  font-size:14px;
  border-radius:10px;
  background:rgba(0,195,255,0.7);
  z-index:20;
}

#confettiBtn{
  position:fixed;
  bottom:60px;
  right:15px;
  padding:10px 15px;
  font-size:14px;
  border-radius:10px;
  background:rgba(255,0,255,0.7);
  z-index:20;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<audio id="bgm" src="music.mp3" preload="auto"></audio>

<h1 id="title">Happy Birthday 🎂</h1>
<p id="text">親友へ、特別なステージを用意したよ！</p>
<button onclick="startGame()" id="mainBtn">NEXT</button>

<img src="rocket.PNG" id="rocket">
<img src="bestfriend.jpg" class="photo" id="photo" style="display:none;">

<button id="fullScreenBtn" onclick="toggleFullScreen()">全画面</button>
<button id="confettiBtn" onclick="confetti()">紙吹雪！</button>

<script>
let level=0;

function startGame(){
  const music=document.getElementById("bgm");
  if(level===0){
    music.play().catch(()=>{});
  }
  nextLevel();
}

function nextLevel(){
  const title=document.getElementById("title");
  const text=document.getElementById("text");
  const btn=document.getElementById("mainBtn");

  level++;

  if(level===1){
    title.innerHTML="LEVEL 1 🚀";
    text.innerHTML="出会ってくれてありがとう。";
  }
  else if(level===2){
    title.innerHTML="LEVEL 2 🌠";
    text.innerHTML="どんな時も支えてくれる、最高の親友へ。";
  }
  else if(level===3){
    title.innerHTML="FINAL STAGE 🌌";
    text.innerHTML="これからも一緒に最強の思い出作ろう！";
  }
  else if(level===4){
    title.innerHTML="今日の主役はcrazyゆうきだ！！";
    text.innerHTML="きよとより";
    btn.innerHTML="新しい1年";
    document.getElementById("photo").style.display="block";
    launchRocket();
    confetti();
  }
  else if(level===5){
    location.reload();
  }
}

function launchRocket(){
  const rocket=document.getElementById("rocket");
  rocket.style.bottom="120%";
}

function confetti(){
  for(let i=0;i<300;i++){
    const c=document.createElement("div");
    c.style.position="fixed";
    const size=4+Math.random()*8;
    c.style.width=size+"px";
    c.style.height=size+"px";
    c.style.background="hsl("+Math.random()*360+",100%,"+(40+Math.random()*30)+"%)";
    c.style.top="-10px";
    c.style.left=Math.random()*100+"%";
    c.style.borderRadius="50%";
    c.style.zIndex="10";
    c.style.animation="fall "+(2+Math.random()*3)+"s linear";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3500);
  }
}

function toggleFullScreen(){
  if (!document.fullscreenElement){
    document.documentElement.requestFullscreen();
  } else {
    if (document.exitFullscreen) document.exitFullscreen();
  }
}

/* 星背景 */
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

function resizeCanvas(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

let stars=[];
for(let i=0;i<250;i++){
  stars.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2,
    dx:(Math.random()-0.5)*0.2,
    dy:(Math.random()-0.5)*0.2
  });
}

function drawStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";
  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();
    s.x+=s.dx;
    s.y+=s.dy;
    if(s.x<0) s.x=canvas.width;
    if(s.x>canvas.width) s.x=0;
    if(s.y<0) s.y=canvas.height;
    if(s.y>canvas.height) s.y=0;
  });
  requestAnimationFrame(drawStars);
}
drawStars();

/* 紙吹雪アニメーション */
const style=document.createElement("style");
style.innerHTML=`
@keyframes fall{
  to{
    transform:translateY(100vh) rotate(720deg);
    opacity:0;
  }
}`;
document.head.appendChild(style);
</script>

</body>
</html>
