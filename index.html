<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宇宙最終覚醒</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial, sans-serif;
  background:black;
  color:white;
  text-align:center;
}

canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-2;
}

.flash{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:white;
  opacity:0;
  pointer-events:none;
  z-index:10;
}

.container{
  margin-top:20vh;
  position:relative;
  z-index:2;
}

h1{
  font-size:2.5em;
  text-shadow:0 0 25px cyan;
}

button{
  background:cyan;
  border:none;
  padding:18px 35px;
  font-size:18px;
  border-radius:40px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.1);
}

#photo{
  width:80%;
  max-width:400px;
  margin-top:20px;
  border-radius:20px;
  display:none;
  box-shadow:0 0 40px cyan;
}

#signature{
  position:fixed;
  bottom:15px;
  width:100%;
  font-size:14px;
  display:none;
}

#lastBtn{
  display:none;
  margin-top:20px;
}

.rocket{
  position:fixed;
  bottom:-250px;
  left:50%;
  transform:translateX(-50%);
  width:130px;
  animation:launch 3s ease-out forwards;
  z-index:5;
  filter: drop-shadow(0 0 30px cyan);
}

@keyframes launch{
  0%{bottom:-250px;}
  100%{bottom:120%;}
}

.fire{
  position:fixed;
  bottom:-200px;
  left:50%;
  transform:translateX(-50%);
  width:30px;
  height:80px;
  background:linear-gradient(to top, orange, red, yellow);
  border-radius:50%;
  animation:fireMove 0.2s infinite alternate;
  z-index:4;
}

@keyframes fireMove{
  from{height:70px;}
  to{height:90px;}
}

.smoke{
  position:fixed;
  bottom:0;
  width:20px;
  height:20px;
  background:rgba(200,200,200,0.4);
  border-radius:50%;
  animation:smokeUp 2s linear forwards;
}

@keyframes smokeUp{
  0%{transform:translateY(0) scale(1); opacity:0.5;}
  100%{transform:translateY(-300px) scale(3); opacity:0;}
}

.confetti{
  position:fixed;
  width:8px;
  height:14px;
  top:-20px;
  animation:fall 3s linear forwards;
}

@keyframes fall{
  0%{transform:translateY(0) rotate(0deg);}
  100%{transform:translateY(100vh) rotate(720deg);}
}

.shake{
  animation:shake 0.4s infinite;
}

@keyframes shake{
  0%{transform:translate(5px,5px);}
  25%{transform:translate(-5px,5px);}
  50%{transform:translate(5px,-5px);}
  75%{transform:translate(-5px,-5px);}
  100%{transform:translate(0,0);}
}
</style>
</head>
<body>

<canvas id="stars"></canvas>
<div class="flash" id="flash"></div>
<audio id="bgm" src="music.mp3"></audio>

<div class="container">
  <h1 id="title">🌌 親友専用クエスト 🌌</h1>
  <p id="text">ミッション：宇宙レベルの1年を始めよ。</p>
  <button onclick="nextLevel()">さぁ新しい1年を始めよう</button>
  <br>
  <img id="photo" src="bestfriend.jpg">
  <br>
  <button id="lastBtn" onclick="celebrate()">新しい1年</button>
</div>

<div id="signature">きよとより</div>

<script>
let level=0;

const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];
for(let i=0;i<200;i++){
  stars.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2,
    d:Math.random()*0.5
  });
}

function drawStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";
  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();
    s.y+=s.d;
    if(s.y>canvas.height){s.y=0;}
  });
}
setInterval(drawStars,30);

function typeWriter(text, element, speed=60){
  element.innerHTML="";
  let i=0;
  function typing(){
    if(i<text.length){
      element.innerHTML+=text.charAt(i);
      i++;
      setTimeout(typing,speed);
    }
  }
  typing();
}

function nextLevel(){
  const title=document.getElementById("title");
  const text=document.getElementById("text");
  const music=document.getElementById("bgm");

  if(level===0){music.play();}
  level++;

  if(level===1){
    title.innerHTML="LEVEL 1 🚀";
    text.innerHTML="出会ってくれてありがとう。";
  }
  else if(level===2){
    title.innerHTML="LEVEL 2 🌠";
    text.innerHTML="どんな時も支えてくれる、最高の親友へ。";
  }
  else if(level===3){
    title.innerHTML="FINAL STAGE 🌌";
    text.innerHTML="これからも一緒に最強の思い出作ろう！";
    setTimeout(ultimate,1500);
  }
}

  const title=document.getElementById("title");
  const text=document.getElementById("text");
  const photo=document.getElementById("photo");
  const signature=document.getElementById("signature");

  document.body.classList.add("shake");

  const rocket=document.createElement("img");
  rocket.src="rocket.png";
  rocket.className="rocket";

  const fire=document.createElement("div");
  fire.className="fire";
  document.body.appendChild(fire);

  for(let i=0;i<15;i++){
