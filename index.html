<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>crazyゆうき BIRTHDAY</title>

<style>
body{
  margin:0;
  padding:0;
  overflow:hidden;
  font-family:sans-serif;
  text-align:center;
  color:white;
  background:linear-gradient(to bottom,#000428,#004e92);
}

canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

h1{
  margin-top:100px;
  font-size:2em;
  text-shadow:0 0 20px #00f;
}

p{
  font-size:1.2em;
  margin:20px;
}

button{
  padding:15px 30px;
  font-size:1.2em;
  border:none;
  border-radius:30px;
  background:#00c3ff;
  color:white;
  cursor:pointer;
  box-shadow:0 0 20px #00c3ff;
}

button:hover{
  background:#0099cc;
}

#rocket{
  position:fixed;
  bottom:-200px;
  left:50%;
  transform:translateX(-50%);
  width:150px;
  transition:3s ease-in-out;
}

.photo{
  width:250px;
  border-radius:20px;
  margin-top:20px;
  box-shadow:0 0 20px white;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<audio id="bgm" src="music.mp3" preload="auto"></audio>

<h1 id="title">Happy Birthday 🎂</h1>
<p id="text">親友へ、特別なステージを用意したよ！</p>
<button onclick="startGame()" id="mainBtn">NEXT</button>

<img src="rocket.PNG" id="rocket">
<img src="bestfriend.jpg" class="photo" id="photo" style="display:none;">

<script>
let level=0;

function startGame(){
  const music=document.getElementById("bgm");
  if(level===0){
    music.play().catch(()=>{});
  }
  nextLevel();
}

function nextLevel(){
  const title=document.getElementById("title");
  const text=document.getElementById("text");
  const btn=document.getElementById("mainBtn");

  level++;

  if(level===1){
    title.innerHTML="LEVEL 1 🚀";
    text.innerHTML="出会ってくれてありがとう。";
  }
  else if(level===2){
    title.innerHTML="LEVEL 2 🌠";
    text.innerHTML="どんな時も支えてくれる、最高の親友へ。";
  }
  else if(level===3){
    title.innerHTML="FINAL STAGE 🌌";
    text.innerHTML="これからも一緒に最強の思い出作ろう！";
  }
  else if(level===4){
    title.innerHTML="今日の主役はcrazyゆうきだ！！";
    text.innerHTML="きよとより";
    btn.innerHTML="新しい1年";
    document.getElementById("photo").style.display="block";
    launchRocket();
    confetti();
  }
  else if(level===5){
    location.reload();
  }
}

function launchRocket(){
  const rocket=document.getElementById("rocket");
  rocket.style.bottom="120%";
}

function confetti(){
  for(let i=0;i<150;i++){
    const c=document.createElement("div");
    c.style.position="fixed";
    c.style.width="8px";
    c.style.height="8px";
    c.style.background="hsl("+Math.random()*360+",100%,50%)";
    c.style.top="-10px";
    c.style.left=Math.random()*100+"%";
    c.style.borderRadius="50%";
    c.style.animation="fall "+(2+Math.random()*3)+"s linear";
    document.body.appendChild(c);
  }
}

const style=document.createElement("style");
style.innerHTML=`
@keyframes fall{
  to{
    transform:translateY(100vh) rotate(720deg);
    opacity:0;
  }
}`;
document.head.appendChild(style);

/* 星背景の修正：canvas サイズ自動更新 */
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

function resizeCanvas(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

let stars=[];
for(let i=0;i<150;i++){
  stars.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2
  });
}

function drawStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";
  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
drawStars();
</script>

</body>
</html>
