<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>親友専用クエスト</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle, #000000, #1a001f);
  color: white;
  text-align: center;
  overflow: hidden;
}

.container {
  padding: 20px;
  margin-top: 15vh;
}

h1 {
  font-size: 2.5em;
  text-shadow: 0 0 25px #ff00ff;
}

p {
  font-size: 1.3em;
}

button {
  background: #ff0080;
  border: none;
  padding: 15px 30px;
  font-size: 18px;
  color: white;
  border-radius: 30px;
  cursor: pointer;
  margin-top: 20px;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.2);
  box-shadow: 0 0 25px #ff00ff;
}

#photo {
  width: 80%;
  max-width: 400px;
  margin-top: 20px;
  border-radius: 20px;
  display: none;
  box-shadow: 0 0 40px #00ffff;
}

.firework {
  position: fixed;
  width: 6px;
  height: 6px;
  background: yellow;
  border-radius: 50%;
  animation: explode 1s ease-out forwards;
}

@keyframes explode {
  to {
    transform: translate(var(--x), var(--y));
    opacity: 0;
  }
}
</style>
</head>

<body>

<audio id="bgm" src="music.mp3"></audio>

<div class="container">
  <h1 id="title">🎮 親友専用クエスト 🎮</h1>
  <p id="text">ミッション：最高の1年をスタートせよ。</p>
  <button onclick="nextLevel()">▶ スタート</button>
  <br>
  <img id="photo" src="bestfriend.jpg">
</div>

<script>
let level = 0;

function nextLevel() {
  const title = document.getElementById("title");
  const text = document.getElementById("text");
  const photo = document.getElementById("photo");
  const music = document.getElementById("bgm");

  if(level === 0){
    music.play();
  }

  level++;

  if(level === 1){
    title.innerHTML = "LEVEL 1 クリア 🎉";
    text.innerHTML = "出会ってくれてありがとう。";
  }
  else if(level === 2){
    title.innerHTML = "LEVEL 2 クリア 💫";
    text.innerHTML = "どんな時も支えてくれる、最高の親友へ。";
  }
  else if(level === 3){
    title.innerHTML = "FINAL STAGE 👑";
    text.innerHTML = "これからも一緒に最強の思い出作ろう！";
    photo.style.display = "block";
    launchFireworks();
  }
  else{
    title.innerHTML = "🎂 HAPPY BIRTHDAY 🎂";
    text.innerHTML = "今日の主役は君だ！！";
  }
}

function launchFireworks(){
  for(let i=0;i<120;i++){
    const fw = document.createElement("div");
    fw.className = "firework";
    fw.style.left = "50%";
    fw.style.top = "50%";
    fw.style.setProperty('--x', (Math.random()*800-400)+'px');
    fw.style.setProperty('--y', (Math.random()*800-400)+'px');
    document.body.appendChild(fw);
    setTimeout(()=>fw.remove(),1000);
  }
}
</script>

</body>
</html>
